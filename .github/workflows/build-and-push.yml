# Build and publish Ansible Execution Environment to Quay
---
name: Build and Publish EE (Podman)

'on':
  push:
    branches: [main]
    tags: ['v*', 'release-*']
  workflow_dispatch:

env:
  # Change this to your Quay repository path: <org>/<repo>
  # Or override via: TARGET_HUB, TARGET_NAME, TARGET_TAG
  TARGET_NAME: ${{ secrets.TARGET_NAME || 'ansible-ee-minimal' }}
  TARGET_TAG: ${{ secrets.TARGET_TAG || 'v5' }}
  TARGET_HUB: ${{ secrets.TARGET_HUB || 'quay.io' }}
  CONTAINER_ENGINE: podman

jobs:
  build-publish:
    runs-on: ubuntu-latest
    env:
      TARGET_NAME: ${{ secrets.TARGET_NAME || 'ansible-ee-minimal' }}
      TARGET_HUB: ${{ secrets.TARGET_HUB || 'quay.io' }}
      CONTAINER_ENGINE: podman
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine Target Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            # If it's a git tag, use it as the image tag
            TAG="${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # If it's main branch, use 'latest'
            TAG="latest"
          else
            # For other branches or PRs, use branch name or 'dev'
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${TAG}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install tooling (Podman + Ansible)
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base podman
          python -m pip install --upgrade pip
          pip install ansible-builder ansible-navigator

      - name: Log in to registry.redhat.io (Podman)
        if: ${{ env.REDHAT_REGISTRY_USERNAME != '' && env.REDHAT_REGISTRY_PASSWORD != '' }}
        env:
          REDHAT_REGISTRY_USERNAME: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          REDHAT_REGISTRY_PASSWORD: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}
        run: |
          echo "$REDHAT_REGISTRY_PASSWORD" | podman login registry.redhat.io \
            --username "$REDHAT_REGISTRY_USERNAME" --password-stdin

      - name: Log in to Quay (Podman)
        run: |
          echo "$QUAY_PASSWORD" | podman login quay.io \
            --username "$QUAY_USERNAME" --password-stdin
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Setup OpenShift Tooling Config
        run: |
          mkdir -p files/optional-configs
          echo "OC_VERSION=stable-4.21" > files/optional-configs/oc-install.env

      - name: Build
        env:
          ANSIBLE_HUB_TOKEN: ${{ secrets.ANSIBLE_HUB_TOKEN }}
        run: |
          make clean
          TARGET_NAME="${{ env.TARGET_NAME }}" TARGET_TAG="${{ steps.tag.outputs.tag }}" CONTAINER_ENGINE=$CONTAINER_ENGINE \
            make build

      - name: Test
        env:
          ANSIBLE_HUB_TOKEN: ${{ secrets.ANSIBLE_HUB_TOKEN }}
        run: |
          TARGET_NAME="${{ env.TARGET_NAME }}" TARGET_TAG="${{ steps.tag.outputs.tag }}" CONTAINER_ENGINE=$CONTAINER_ENGINE \
            make test

      - name: Verify AAP 2.6 Base Image
        run: |
          echo "Verifying AAP 2.6 base image is configured..."
          grep -q "ansible-automation-platform-26" execution-environment.yml || { echo "ERROR: AAP 2.6 base image not configured"; exit 1; }
          echo "✓ AAP 2.6 base image confirmed"

      - name: Verify oc-mirror Binary
        run: |
          echo "Verifying oc-mirror binary is included..."
          podman run --rm ${{ env.TARGET_NAME }}:${{ steps.tag.outputs.tag }} which oc-mirror || { echo "ERROR: oc-mirror not found"; exit 1; }
          echo "✓ oc-mirror binary confirmed"

      - name: Install Trivy for Local Scanning
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Security Scan (Local with Trivy)
        run: |
          echo "Scanning image for HIGH and CRITICAL vulnerabilities..."
          trivy image --severity HIGH,CRITICAL --exit-code 0 ${{ env.TARGET_NAME }}:${{ steps.tag.outputs.tag }}
          echo "Local scan complete. Full scan will run on Quay after publish."

      - name: Publish
        run: |
          TARGET_NAME="${{ env.TARGET_NAME }}" TARGET_TAG="${{ steps.tag.outputs.tag }}" CONTAINER_ENGINE=$CONTAINER_ENGINE \
            make publish

      - name: Security Scan (Quay.io)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Triggering Quay.io security scan..."
          echo "Image will be scanned automatically by Quay.io vulnerability scanner"
          echo "View results at: https://quay.io/repository/${{ secrets.QUAY_USERNAME }}/${{ env.TARGET_NAME }}?tab=tags&tag=${{ steps.tag.outputs.tag }}"
          sleep 30
          echo "Scan initiated. Check Quay.io for detailed results."

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign Container Images
        if: startsWith(github.ref, 'refs/tags/v') && secrets.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "Signing images with cosign..."
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          cosign sign --yes --key cosign.key quay.io/${{ secrets.QUAY_USERNAME }}/${{ env.TARGET_NAME }}:${{ steps.tag.outputs.tag }}
          cosign sign --yes --key cosign.key quay.io/${{ secrets.QUAY_USERNAME }}/${{ env.TARGET_NAME }}:latest
          rm cosign.key
          echo "✓ Images signed successfully"

      - name: Sign Container Images (Keyless)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.COSIGN_PRIVATE_KEY == ''
        run: |
          echo "Note: COSIGN_PRIVATE_KEY not configured. Keyless signing requires manual OIDC authentication."
          echo "To enable automated signing, add COSIGN_PRIVATE_KEY and COSIGN_PASSWORD to GitHub Secrets."
          echo "Generate keys with: make generate-signing-key"
